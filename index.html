<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grammar Swipe: Past vs Present Perfect</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; color: white; touch-action: none;
            transition: background-color 0.3s ease;
        }
        #game-container { position: relative; width: 320px; height: 400px; }
        .side-label {
            position: absolute; top: 50%; transform: translateY(-50%);
            font-weight: bold; color: rgba(255,255,255,0.2); font-size: 0.9rem; z-index: 0;
        }
        .left-label { left: -80px; color: var(--wrong-color); }
        .right-label { right: -80px; color: var(--correct-color); }
        
        #card {
            width: 100%; height: 280px; background: white; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center;
            justify-content: center; padding: 25px; text-align: center;
            font-size: 1.3rem; color: #333; cursor: grab; position: absolute;
            top: 50%; left: 0; transform: translateY(-50%);
            transition: transform 0.1s ease, background-color 0.3s ease;
            user-select: none; z-index: 10; box-sizing: border-box;
        }
        
        #score { margin-bottom: 20px; font-size: 1.8rem; font-weight: bold; transition: transform 0.2s; }
        .score-pop { transform: scale(1.3); color: var(--correct-color); }

        /* Floating Feedback Effect */
        #feedback-text {
            position: absolute; top: 30%; font-size: 3rem; font-weight: bold;
            pointer-events: none; opacity: 0; z-index: 20; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .pop-animation { animation: popUp 0.6s ease-out forwards; }
        @keyframes popUp {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1); top: 10%; }
        }

        .hint { margin-top: 30px; font-size: 0.8rem; color: #bdc3c7; text-align: center; }
    </style>
</head>
<body>

    <div id="score">Score: 0</div>
    <div id="feedback-text"></div>
    
    <div id="game-container">
        <div class="side-label left-label">⬅ PAST SIMPLE</div>
        <div class="side-label right-label">PRESENT PERFECT ➡</div>
        <div id="card">Loading...</div>
    </div>

    <div class="hint">Swipe Left: Past Simple | Swipe Right: Present Perfect</div>

    <script>
        const questions = [
            { s: "I finished my homework an hour ago.", t: "past" },
            { s: "Have you ever eaten lobster?", t: "present" },
            { s: "She lost her keys yesterday morning.", t: "past" },
            { s: "We have already seen this movie.", t: "present" },
            { s: "They went to Da Lat last summer.", t: "past" },
            { s: "I have just broken my glasses.", t: "present" },
            { s: "Did you see him at the party?", t: "past" },
            { s: "My sister has never traveled abroad.", t: "present" },
            { s: "The rain stopped a few minutes ago.", t: "past" },
            { s: "Someone has stolen my bicycle!", t: "present" },
            { s: "I bought this shirt on sale.", t: "past" },
            { s: "The train has already left the station.", t: "present" },
            { s: "We lived in Tokyo when I was a child.", t: "past" },
            { s: "He has recently started a new job.", t: "present" },
            { s: "I didn't call you last night.", t: "past" },
            { s: "Have they finished their dinner yet?", t: "present" },
            { s: "The Titanic sank in 1912.", t: "past" },
            { s: "I have misplaced my passport.", t: "present" },
            { s: "Shakespeare wrote many famous plays.", t: "past" },
            { s: "Up to now, we haven't had any problems.", t: "present" }
        ];

        let currentIdx = 0, score = 0, isDragging = false, startX = 0, moveX = 0;
        const card = document.getElementById('card');
        const scoreEl = document.getElementById('score');
        const feedbackEl = document.getElementById('feedback-text');

        function loadCard() {
            if (currentIdx >= questions.length) {
                card.innerHTML = "🎉 GAME OVER!<br>Final Score: " + score + "/" + questions.length;
                card.style.transform = "translateY(-50%)";
                return;
            }
            card.textContent = questions[currentIdx].s;
            card.style.transform = "translate(0, -50%)";
            card.style.backgroundColor = "white";
        }

        const startDrag = (e) => {
            if (currentIdx >= questions.length) return;
            isDragging = true;
            startX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
            card.style.transition = "none";
        };

        const drag = (e) => {
            if (!isDragging) return;
            const x = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
            moveX = x - startX;
            card.style.transform = `translate(${moveX}px, -50%) rotate(${moveX * 0.05}deg)`;
            if (moveX < -50) card.style.backgroundColor = "#fadbd8";
            else if (moveX > 50) card.style.backgroundColor = "#d4efdf";
            else card.style.backgroundColor = "white";
        };

        const endDrag = () => {
            if (!isDragging) return;
            isDragging = false;
            card.style.transition = "transform 0.4s ease, background-color 0.3s ease";
            if (moveX < -120) checkAnswer("past");
            else if (moveX > 120) checkAnswer("present");
            else {
                card.style.transform = "translate(0, -50%)";
                card.style.backgroundColor = "white";
            }
            moveX = 0;
        };

        function checkAnswer(choice) {
            const correct = questions[currentIdx].t === choice;
            
            // Visual Feedback
            feedbackEl.textContent = correct ? "CORRECT!" : "WRONG!";
            feedbackEl.style.color = correct ? "#2ecc71" : "#e74c3c";
            feedbackEl.classList.remove('pop-animation');
            void feedbackEl.offsetWidth; // Trigger reflow
            feedbackEl.classList.add('pop-animation');

            // Flash Screen
            document.body.style.backgroundColor = correct ? "#1e8449" : "#922b21";
            setTimeout(() => { document.body.style.backgroundColor = "#2c3e50"; }, 400);

            if (correct) {
                score++;
                scoreEl.textContent = `Score: ${score}`;
                scoreEl.classList.add('score-pop');
                setTimeout(() => scoreEl.classList.remove('score-pop'), 200);
            }
            
            card.style.transform = choice === "past" ? "translate(-600px, -50%)" : "translate(600px, -50%)";
            currentIdx++;
            setTimeout(loadCard, 400);
        }

        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', startDrag);
        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag);
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        loadCard();
    </script>
</body>
</html>
